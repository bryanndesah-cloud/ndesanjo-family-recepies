<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NDESANJO FAMILY RECIPES</title>

<style>
:root {
    --primary: #dc2626;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #111827;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    transition: 0.3s;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: var(--primary);
    color: white;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: none;
    background: transparent;
    color: white;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.25);
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* CARD */
.card {
    background: var(--card);
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 15px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
button.primary {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 50px;
    cursor: pointer;
}

/* LISTS */
.ingredients-list {
    list-style-type: disc;
    padding-left: 20px;
}

.star-list li::marker {
    content: "★ ";
    color: var(--primary);
}

/* IMAGE */
img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    body { flex-direction: column; }

    .sidebar {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }

    .sidebar button {
        width: 45%;
        text-align: center;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🍲 NDESANJO</h2>

<button onclick="setView('all')">📚 All</button>
<button onclick="setView('Favorites')">⭐ Favorites</button>
<button onclick="setView('Breakfast')">🍳 Breakfast</button>
<button onclick="setView('Lunch')">🥪 Lunch</button>
<button onclick="setView('Dinner')">🍲 Dinner</button>
<button onclick="setView('Dessert')">🍰 Dessert</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<!-- MAIN -->
<div class="main">

<h2 id="header"></h2>

<div class="card">
<form id="form">
<input type="hidden" id="editIndex">

<input id="title" placeholder="Recipe name" required>

<textarea id="ingredients" placeholder="Ingredients (one per line)" required></textarea>

<textarea id="instructions" placeholder="Instructions (one per line)" required></textarea>

<select id="category">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Dessert</option>
</select>

<input type="file" id="image" style="display:none">
<label onclick="image.click()">📸 Add Image</label>

<button class="primary">💾 Save Recipe</button>
</form>
</div>

<div class="card">
<input id="search" placeholder="Search..." oninput="display()">
</div>

<div id="list"></div>

</div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
let currentView = "all";

/* SAVE */
function save(){
localStorage.setItem("recipes", JSON.stringify(recipes));
}

/* FORM */
form.onsubmit = e => {
e.preventDefault();

const file = image.files[0];
const reader = new FileReader();

const saveData = (img="") => {
const data = {
title: title.value,
ingredients: ingredients.value.split("\n"),
instructions: instructions.value.split("\n"),
category: category.value,
image: img,
fav: false
};

if(editIndex.value==="") recipes.push(data);
else recipes[editIndex.value]=data;

save();
display();
form.reset();
};

if(file){
reader.onload = () => saveData(reader.result);
reader.readAsDataURL(file);
}else{
saveData();
}
};

/* VIEW */
function setView(v){
currentView = v;
display();
}

/* DISPLAY */
function display(){
list.innerHTML = "";

const s = search.value.toLowerCase();

recipes.forEach((r,i)=>{
if(s && !r.title.toLowerCase().includes(s)) return;
if(currentView==="Favorites" && !r.fav) return;
if(currentView!=="all" && currentView!=="Favorites" && r.category!==currentView) return;

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>🍽️ ${r.title}</h3>

<p><strong>#${r.category}</strong></p>

<strong>🧂 Ingredients:</strong>
<ul class="ingredients-list">
${r.ingredients.map(x=>`<li>${x}</li>`).join("")}
</ul>

<strong>📖 Instructions:</strong>
<ul class="star-list">
${r.instructions.map(x=>`<li>${x}</li>`).join("")}
</ul>

${r.image ? `<img src="${r.image}">` : ""}

<div>
<button onclick="fav(${i})">⭐</button>
<button onclick="editR(${i})">✏️</button>
<button onclick="del(${i})">🗑</button>
</div>
`;

list.appendChild(div);
});
}

/* DELETE */
function del(i){
if(confirm("Delete?")){
recipes.splice(i,1);
save();
display();
}
}

/* EDIT */
function editR(i){
const r = recipes[i];
title.value = r.title;
ingredients.value = r.ingredients.join("\n");
instructions.value = r.instructions.join("\n");
category.value = r.category;
editIndex.value = i;
scrollTo({top:0, behavior:"smooth"});
}

/* FAVORITE */
function fav(i){
recipes[i].fav = !recipes[i].fav;
save();
display();
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

display();
</script>

</body>
</html>
