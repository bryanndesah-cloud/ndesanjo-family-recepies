<!DOCTYPE html>
<html>
<head>
    <title>Recipe App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f7fa;
        }

        header {
            background: #ff7043;
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .container {
            padding: 15px;
            max-width: 700px;
            margin: auto;
        }

        h2 {
            margin-top: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            border-color: #ff7043;
            outline: none;
        }

        button {
            background: #ff7043;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #e65c2e;
        }

        .recipe {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .actions button {
            width: auto;
            margin-right: 10px;
            margin-top: 10px;
        }

        .search-box {
            margin-top: 10px;
        }

        .message {
            padding: 10px;
            background: #d4edda;
            color: #155724;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🍲 My Recipe Book</h1>
</header>

<div class="container">

    <div class="message" id="message">✅ Recipe saved!</div>

    <h2>Add Recipe</h2>
    <form id="recipeForm">
        <input type="hidden" id="editIndex">

        <label>Recipe Title</label>
        <input type="text" id="title" placeholder="e.g. Spaghetti Bolognese" required>

        <label>Ingredients</label>
        <textarea id="ingredients" placeholder="List ingredients..." required></textarea>

        <label>Instructions</label>
        <textarea id="instructions" placeholder="Step-by-step instructions..." required></textarea>

        <button type="submit">💾 Save Recipe</button>
    </form>

    <h2>Search</h2>
    <input type="text" id="search" class="search-box" placeholder="🔍 Search recipes..." oninput="displayRecipes()">

    <h2>Your Recipes</h2>
    <div id="recipesList"></div>
    <div id="emptyState" class="empty">No recipes yet. Start by adding one 👆</div>

</div>

<script>
    let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

    const form = document.getElementById("recipeForm");
    const recipesList = document.getElementById("recipesList");
    const message = document.getElementById("message");
    const emptyState = document.getElementById("emptyState");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const title = document.getElementById("title").value.trim();
        const ingredients = document.getElementById("ingredients").value.trim();
        const instructions = document.getElementById("instructions").value.trim();
        const editIndex = document.getElementById("editIndex").value;

        const recipeData = {
            title,
            ingredients,
            instructions,
            date: new Date().toLocaleString()
        };

        if (editIndex === "") {
            recipes.push(recipeData);
        } else {
            recipes[editIndex] = recipeData;
            document.getElementById("editIndex").value = "";
        }

        saveRecipes();
        displayRecipes();
        form.reset();

        showMessage("✅ Recipe saved!");
    });

    function saveRecipes() {
        localStorage.setItem("recipes", JSON.stringify(recipes));
    }

    function displayRecipes() {
        const search = document.getElementById("search").value.toLowerCase();
        recipesList.innerHTML = "";

        const filtered = recipes.filter(r =>
            r.title.toLowerCase().includes(search)
        );

        if (filtered.length === 0) {
            emptyState.style.display = "block";
        } else {
            emptyState.style.display = "none";
        }

        filtered.forEach((recipe, index) => {
            const div = document.createElement("div");
            div.className = "recipe";

            div.innerHTML = `
                <h3>${recipe.title}</h3>
                <small>${recipe.date}</small>
                <p><strong>Ingredients:</strong><br>${recipe.ingredients}</p>
                <p><strong>Instructions:</strong><br>${recipe.instructions}</p>

                <div class="actions">
                    <button onclick="editRecipe(${index})">✏️ Edit</button>
                    <button onclick="deleteRecipe(${index})">🗑 Delete</button>
                </div>
            `;

            recipesList.appendChild(div);
        });
    }

    function deleteRecipe(index) {
        if (confirm("Are you sure you want to delete this recipe?")) {
            recipes.splice(index, 1);
            saveRecipes();
            displayRecipes();
            showMessage("🗑 Recipe deleted");
        }
    }

    function editRecipe(index) {
        const recipe = recipes[index];

        document.getElementById("title").value = recipe.title;
        document.getElementById("ingredients").value = recipe.ingredients;
        document.getElementById("instructions").value = recipe.instructions;
        document.getElementById("editIndex").value = index;

        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showMessage(text) {
        message.innerText = text;
        message.style.display = "block";

        setTimeout(() => {
            message.style.display = "none";
        }, 2000);
    }

    displayRecipes();
</script>

</body>
</html>
